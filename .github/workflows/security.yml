name: Security

# Consolidated vulnerability scanning. Runs on every push/PR to master, on a
# weekly schedule (so newly disclosed vulnerabilities in unchanged code are
# still caught), and on demand.
#
# Note: Go SAST (gosec) is intentionally not duplicated here — golangci-lint in
# ci.yml already runs gosec and honours the repository's //nolint:gosec
# suppressions. CodeQL is omitted because it requires GitHub Advanced Security
# on private repositories.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 3 * * 1' # Mondays 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy scan (deps, misconfig, secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so secrets in past commits are caught

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
