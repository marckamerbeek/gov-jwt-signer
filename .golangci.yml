run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/marckamerbeek/gov-jwt-signer
  misspell:
    locale: US
  gosec:
    excludes:
      # G115: integer overflow conversion is handled elsewhere; not relevant here.
      - G115

issues:
  exclude-rules:
    # Tests may have longer, descriptive functions.
    - path: _test\.go
      linters:
        - gosec
        - unparam
