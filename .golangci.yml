run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/jwt-extauth/gloo-gateway-extauth-sec
  misspell:
    locale: US
  gosec:
    excludes:
      # G115: integer overflow conversie wordt elders afgevangen; niet relevant hier.
      - G115

issues:
  exclude-rules:
    # Tests mogen langere, beschrijvende functies hebben.
    - path: _test\.go
      linters:
        - gosec
        - unparam
