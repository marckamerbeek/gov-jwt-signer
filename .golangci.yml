version: "2"

run:
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gosec:
      excludes:
        # G115: integer overflow conversion is handled elsewhere; not relevant here.
        - G115
    misspell:
      locale: UK
  exclusions:
    generated: lax
    rules:
      # Tests may have longer, descriptive functions.
      - path: _test\.go
        linters:
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/marckamerbeek/gov-jwt-signer
